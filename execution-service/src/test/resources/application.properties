spring.application.name=execution-service
server.port=0

spring.datasource.url=jdbc:h2:mem:execution_service_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=mysupersecretkeymysupersecretkey1234567890

codesync.execution.queue.mode=local
codesync.execution.docker.enabled=false

eureka.client.enabled=false
spring.cloud.discovery.enabled=false
management.health.rabbit.enabled=false
