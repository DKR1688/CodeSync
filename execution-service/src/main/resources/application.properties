spring.config.import=optional:file:../auth-service/.env[.properties]

spring.application.name=execution-service
server.port=8088

spring.datasource.url=${EXECUTION_DATASOURCE_URL:jdbc:mysql://localhost:3306/execution_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${EXECUTION_DATASOURCE_USERNAME:${DATASOURCE_USERNAME:root}}
spring.datasource.password=${EXECUTION_DATASOURCE_PASSWORD:${DATASOURCE_PASSWORD:deepak@1234}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey1234567890}

codesync.services.project.base-url=${PROJECT_SERVICE_URL:http://localhost:8082}

codesync.execution.queue.mode=${EXECUTION_QUEUE_MODE:local}
codesync.execution.queue.exchange=${EXECUTION_QUEUE_EXCHANGE:execution.exchange}
codesync.execution.queue.name=${EXECUTION_QUEUE_NAME:execution.jobs}
codesync.execution.queue.routing-key=${EXECUTION_QUEUE_ROUTING_KEY:execution.jobs}
codesync.execution.worker.core-pool-size=${EXECUTION_WORKER_CORE_POOL_SIZE:2}
codesync.execution.worker.max-pool-size=${EXECUTION_WORKER_MAX_POOL_SIZE:4}
codesync.execution.worker.queue-capacity=${EXECUTION_WORKER_QUEUE_CAPACITY:100}

codesync.execution.docker.enabled=${EXECUTION_DOCKER_ENABLED:true}
codesync.execution.default-time-limit-seconds=${EXECUTION_DEFAULT_TIME_LIMIT_SECONDS:20}
codesync.execution.default-memory-limit-mb=${EXECUTION_DEFAULT_MEMORY_LIMIT_MB:256}
codesync.execution.default-cpu-limit=${EXECUTION_DEFAULT_CPU_LIMIT:1.0}
codesync.execution.max-time-limit-seconds=${EXECUTION_MAX_TIME_LIMIT_SECONDS:30}
codesync.execution.max-memory-limit-mb=${EXECUTION_MAX_MEMORY_LIMIT_MB:256}
codesync.execution.max-source-bytes=${EXECUTION_MAX_SOURCE_BYTES:1048576}
codesync.execution.max-stdin-bytes=${EXECUTION_MAX_STDIN_BYTES:65536}

server.error.include-message=always
server.error.include-binding-errors=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

management.endpoints.web.exposure.include=health,info
management.health.rabbit.enabled=${EXECUTION_RABBIT_HEALTH_ENABLED:false}
