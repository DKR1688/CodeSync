spring.application.name=notification-service
server.port=0

spring.datasource.url=jdbc:h2:mem:notification_service_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=mysupersecretkeymysupersecretkey1234567890

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

notification.email.enabled=false
spring.cache.type=simple
spring.autoconfigure.exclude=org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
management.health.redis.enabled=false
