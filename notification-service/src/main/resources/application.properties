spring.config.import=optional:file:../auth-service/.env[.properties]

spring.application.name=notification-service
server.port=8087

spring.datasource.url=${NOTIFICATION_DATASOURCE_URL:jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${NOTIFICATION_DATASOURCE_USERNAME:${DATASOURCE_USERNAME:root}}
spring.datasource.password=${NOTIFICATION_DATASOURCE_PASSWORD:${DATASOURCE_PASSWORD:deepak@1234}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey1234567890}

server.error.include-message=always
server.error.include-binding-errors=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
notification.websocket.allowed-origins=${NOTIFICATION_ALLOWED_ORIGINS:*}


spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
management.health.rabbit.enabled=true
codesync.rabbit.exchange=${CODESYNC_RABBIT_EXCHANGE:codesync.events}
codesync.rabbit.queue.notification=${CODESYNC_RABBIT_NOTIFICATION_QUEUE:notification.events}
codesync.rabbit.routing-key.notification-send=${CODESYNC_RABBIT_NOTIFICATION_SEND_ROUTING_KEY:notification.send}
