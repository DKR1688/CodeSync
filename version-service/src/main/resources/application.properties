spring.application.name=version-service
server.port=8085

spring.config.import=optional:file:../auth-service/.env[.properties]

spring.datasource.url=${VERSION_DATASOURCE_URL:jdbc:mysql://localhost:3306/version_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${VERSION_DATASOURCE_USERNAME:${DATASOURCE_USERNAME:root}}
spring.datasource.password=${VERSION_DATASOURCE_PASSWORD:${DATASOURCE_PASSWORD:deepak@1234}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey1234567890}

server.error.include-message=always
server.error.include-binding-errors=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

management.endpoints.web.exposure.include=health,info

codesync.services.project.base-url=${PROJECT_SERVICE_BASE_URL:http://localhost:8082}
codesync.services.file.base-url=${FILE_SERVICE_BASE_URL:http://localhost:8083}
