spring.config.import=optional:file:../auth-service/.env[.properties]

spring.application.name=comment-service
server.port=8086

spring.datasource.url=${COMMENT_DATASOURCE_URL:jdbc:mysql://localhost:3306/comment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${COMMENT_DATASOURCE_USERNAME:${DATASOURCE_USERNAME:root}}
spring.datasource.password=${COMMENT_DATASOURCE_PASSWORD:${DATASOURCE_PASSWORD:deepak@1234}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey1234567890}

server.error.include-message=always
server.error.include-binding-errors=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

management.endpoints.web.exposure.include=health,info

comment.mentions.notifications-enabled=${COMMENT_MENTION_NOTIFICATIONS_ENABLED:true}

comment.client.auth-service-url=${AUTH_SERVICE_URL:http://localhost:8081}
comment.client.project-service-url=${PROJECT_SERVICE_URL:http://localhost:8082}
comment.client.notification-service-url=${NOTIFICATION_SERVICE_URL:http://localhost:8087}
