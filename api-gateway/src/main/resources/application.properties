spring.config.import=optional:file:../auth-service/.env[.properties]

spring.application.name=api-gateway
server.port=${API_GATEWAY_PORT:8080}
server.forward-headers-strategy=framework

gateway.allowed-origins=${GATEWAY_ALLOWED_ORIGINS:*}

spring.codec.max-in-memory-size=16MB

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

spring.cloud.gateway.server.webflux.default-filters[0]=PreserveHostHeader
spring.cloud.gateway.server.webflux.default-filters[1]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers RETAIN_FIRST
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=5000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=15s

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URL:lb://AUTH-SERVICE}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**,/oauth2/**,/login/oauth2/**

spring.cloud.gateway.server.webflux.routes[1].id=project-service
spring.cloud.gateway.server.webflux.routes[1].uri=${PROJECT_SERVICE_URL:lb://PROJECT-SERVICE}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/projects/**

spring.cloud.gateway.server.webflux.routes[2].id=file-service
spring.cloud.gateway.server.webflux.routes[2].uri=${FILE_SERVICE_URL:lb://FILE-SERVICE}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/files/**

spring.cloud.gateway.server.webflux.routes[3].id=collab-service
spring.cloud.gateway.server.webflux.routes[3].uri=${COLLAB_SERVICE_URL:lb://COLLAB-SERVICE}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/sessions/**

spring.cloud.gateway.server.webflux.routes[4].id=version-service
spring.cloud.gateway.server.webflux.routes[4].uri=${VERSION_SERVICE_URL:lb://VERSION-SERVICE}
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/versions/**

spring.cloud.gateway.server.webflux.routes[5].id=comment-service
spring.cloud.gateway.server.webflux.routes[5].uri=${COMMENT_SERVICE_URL:lb://COMMENT-SERVICE}
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/v1/comments/**

spring.cloud.gateway.server.webflux.routes[6].id=notification-service
spring.cloud.gateway.server.webflux.routes[6].uri=${NOTIFICATION_SERVICE_URL:lb://NOTIFICATION-SERVICE}
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/notifications/**,/ws/notifications/**

spring.cloud.gateway.server.webflux.routes[7].id=execution-service
spring.cloud.gateway.server.webflux.routes[7].uri=${EXECUTION_SERVICE_URL:lb://EXECUTION-SERVICE}
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/v1/executions/**,/ws/executions/**

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.access=read-only
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=CodeSync API Gateway
info.app.description=Single entry point for auth, project, and file services.
info.services.auth=/auth/**,/oauth2/**,/login/oauth2/**
info.services.project=/api/v1/projects/**
info.services.file=/api/v1/files/**
info.services.collab=/api/v1/sessions/**
info.services.version=/api/v1/versions/**
info.services.comment=/api/v1/comments/**
info.services.notification=/api/v1/notifications/**,/ws/notifications/**
info.services.execution=/api/v1/executions/**,/ws/executions/**
