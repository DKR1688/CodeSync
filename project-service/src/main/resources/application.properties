spring.config.import=optional:file:../auth-service/.env[.properties]

spring.application.name=project-service
server.port=8082

spring.datasource.url=${PROJECT_DATASOURCE_URL:jdbc:mysql://localhost:3306/project_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${PROJECT_DATASOURCE_USERNAME:${DATASOURCE_USERNAME:root}}
spring.datasource.password=${PROJECT_DATASOURCE_PASSWORD:${DATASOURCE_PASSWORD:deepak@1234}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey1234567890}

auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}

server.error.include-message=always
server.error.include-binding-errors=always

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha


spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
management.health.rabbit.enabled=true
codesync.rabbit.exchange=${CODESYNC_RABBIT_EXCHANGE:codesync.events}
codesync.rabbit.routing-key.notification-send=${CODESYNC_RABBIT_NOTIFICATION_SEND_ROUTING_KEY:notification.send}
codesync.rabbit.routing-key.project-created=${CODESYNC_RABBIT_PROJECT_CREATED_ROUTING_KEY:project.created}
codesync.rabbit.routing-key.project-member-added=${CODESYNC_RABBIT_PROJECT_MEMBER_ADDED_ROUTING_KEY:project.member.added}
