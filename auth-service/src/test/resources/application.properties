spring.datasource.url=jdbc:h2:mem:auth-service-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=test-secret-that-is-long-enough-for-jwt-signing
jwt.expiration=86400000

spring.security.oauth2.client.registration.github.client-id=test-github-id
spring.security.oauth2.client.registration.github.client-secret=test-github-secret
spring.security.oauth2.client.registration.google.client-id=test-google-id
spring.security.oauth2.client.registration.google.client-secret=test-google-secret

eureka.client.enabled=false
