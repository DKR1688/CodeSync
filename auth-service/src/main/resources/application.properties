spring.config.import=optional:file:.env[.properties]

spring.application.name=auth-service
server.port=8081

spring.datasource.url=${DATASOURCE_URL:jdbc:mysql://localhost:3306/codesync_auth}
spring.datasource.username=${DATASOURCE_USERNAME:root}
spring.datasource.password=${DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${AUTH_DB_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mysupersecretkeymysupersecretkey1234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:dev-github-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:dev-github-client-secret}
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.registration.github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/login/oauth2/code/github}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

management.endpoints.web.exposure.include=health,info

codesync.gateway-base-url=${CODESYNC_GATEWAY_BASE_URL:http://localhost:8080}
codesync.frontend-base-url=${CODESYNC_FRONTEND_BASE_URL:http://127.0.0.1:4200}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha


spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
management.health.rabbit.enabled=true
